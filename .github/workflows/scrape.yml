name: Scrape Lorain County Bookings

on:
  schedule:
    # Run every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        id: scrape
        run: python scraper/scraper.py

      - name: Commit and push changes
        if: steps.scrape.outputs.has_new == 'true' || always()
        run: |
          git config user.name "Booking Bot"
          git config user.email "bot@lorain-bookings.com"
          git add data/ images/

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
          NEW=${{ steps.scrape.outputs.new_bookings || '0' }}
          TOTAL=${{ steps.scrape.outputs.total_bookings || '?' }}

          git commit -m "Update bookings: ${NEW} new (${TOTAL} total) - ${TIMESTAMP}"
          git push
